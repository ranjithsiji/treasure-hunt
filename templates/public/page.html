{% extends "base.html" %}

{% block title %}{{ page.title }} - Treasure Hunt{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('public.home') }}">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">{{ page.title }}</li>
                </ol>
            </nav>

            <div class="card shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <h1 class="display-6 fw-bold mb-4">{{ page.title }}</h1>
                    <hr class="mb-4">
                    <div class="page-content">
                        {{ page.content | safe if page.content else '<p class="text-muted">This page has no content yet.</p>' }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
